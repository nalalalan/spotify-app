<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Driving History | spotify.aolabs.io</title>
    <meta name="description" content="A minimal timeline of Alan's Driving Spotify playlist history from v1 through v13.">
    <link rel="canonical" href="https://spotify.aolabs.io/">
    <meta property="og:title" content="Driving history">
    <meta property="og:description" content="A quiet visual timeline of Alan's Driving Spotify playlist versions.">
    <meta property="og:url" content="https://spotify.aolabs.io/">
    <meta property="og:type" content="website">
    <link rel="icon" href="https://aolabs.io/favicon.svg?v=20260513-ao-size" type="image/svg+xml">
    <link rel="apple-touch-icon" href="https://aolabs.io/marks/ao-ink.svg?v=20260513-ao-size">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <a class="ao-link" href="https://aolabs.io/" aria-label="AO Labs">
          <span class="ao-mark" aria-hidden="true">AO</span>
        </a>
        <div class="brand">
          <span>spotify.aolabs.io</span>
          <h1>Driving history</h1>
        </div>
        <a class="profile-link" href="https://open.spotify.com/user/1245603146?si=ac25e33ff71d4393" target="_blank" rel="noreferrer">Spotify</a>
      </header>

      <section class="overview" aria-label="Playlist history overview">
        <div class="current-cover-wrap">
          <img id="currentCover" class="current-cover" alt="">
        </div>
        <div class="current-copy">
          <p id="rangeLabel" class="range-label">Oct 2, 2022 - May 9, 2026</p>
          <h2 id="currentTitle">driving v13</h2>
          <div class="current-meta">
            <span id="currentDate">May 9, 2026</span>
            <span id="currentTracks">62 songs</span>
            <span id="currentArtists">NewJeans / Red Velvet / ILLIT</span>
          </div>
          <div class="mix-panel" aria-label="Genre mix">
            <div class="mix-head">
              <span>Genre mix</span>
              <strong id="mixCoverage">all 62 songs</strong>
            </div>
            <div id="mixBar" class="mix-bar" aria-hidden="true"></div>
            <div id="mixLegend" class="mix-legend"></div>
          </div>
          <a id="openSpotify" class="open-link" href="#" target="_blank" rel="noreferrer">Open in Spotify</a>
        </div>
      </section>

      <section class="timeline-wrap" aria-label="Playlist versions">
        <div class="timeline-head">
          <span id="versionCount">13 versions</span>
          <span id="songCount">391 songs</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="songs-section" aria-label="Selected playlist songs">
        <div class="songs-head">
          <div>
            <span class="small-label">Songs</span>
            <strong id="songsTitle">driving v13</strong>
          </div>
          <span id="songsCoverage">62 songs</span>
        </div>
        <div id="songsList" class="songs-list"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
