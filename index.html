<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>spotify.aolabs.io</title>
    <meta name="description" content="Alan's Spotify playlist versions from v1 through v13.">
    <link rel="canonical" href="https://spotify.aolabs.io/">
    <meta property="og:title" content="spotify.aolabs.io">
    <meta property="og:description" content="Alan's Spotify playlist versions from v1 through v13.">
    <meta property="og:url" content="https://spotify.aolabs.io/">
    <meta property="og:type" content="website">
    <link rel="icon" href="/icon.svg?v=20260516-spotify-suite" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg?v=20260516-spotify-suite">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://aolabs.io/suite-header.css?v=20260516-suite-bloom">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="suite-topbar" aria-label="spotify navigation">
        <div class="suite-brand-cluster">
          <a class="suite-ao-home" href="https://aolabs.io/" aria-label="aolabs.io">
            <img src="https://aolabs.io/marks/ao-ink.svg?v=20260516-suite-bloom" alt="">
          </a>
          <a class="suite-app-brand" href="/" aria-label="spotify home">
            <img class="suite-app-mark" src="/icon.svg?v=20260516-spotify-suite" alt="">
            <span class="suite-app-name">spotify.aolabs.io</span>
          </a>
        </div>
        <div class="suite-topbar-actions" aria-label="spotify actions">
          <a href="https://open.spotify.com/user/1245603146?si=ac25e33ff71d4393" target="_blank" rel="noreferrer">spotify</a>
        </div>
      </header>

      <section class="overview" aria-label="Playlist overview">
        <div class="current-cover-wrap">
          <img id="currentCover" class="current-cover" alt="">
        </div>
        <div class="current-copy">
          <p id="rangeLabel" class="range-label">Oct 2, 2022 - May 9, 2026</p>
          <h1 id="currentTitle">driving v13</h1>
          <div class="current-meta">
            <span id="currentDate">May 9, 2026</span>
            <span id="currentTracks">62 songs</span>
            <span id="currentArtists">NewJeans / Red Velvet / ILLIT</span>
          </div>
          <div class="analytics-layout">
            <div class="analytics-main">
              <div class="mix-panel" aria-label="Artist/composer mix">
                <div class="mix-head">
                  <span>Artist mix</span>
                  <strong id="mixCoverage">all 62 songs</strong>
                </div>
                <div id="mixBar" class="mix-bar" aria-hidden="true"></div>
                <div id="mixLegend" class="mix-legend"></div>
              </div>
              <div class="trend-panel" aria-label="Artist play share over time">
                <div class="mix-head">
                  <span>Artist share over time</span>
                </div>
                <div id="styleChart" class="style-chart"></div>
              </div>
            </div>
            <div class="artist-rank-panel" aria-label="Artists ranked by total era plays">
              <ol id="artistRankList" class="artist-rank-list"></ol>
            </div>
          </div>
          <a id="openSpotify" class="open-link" href="#" target="_blank" rel="noreferrer">Open in Spotify</a>
        </div>
      </section>

      <section class="timeline-wrap" aria-label="Playlist versions">
        <div class="timeline-head">
          <span id="versionCount">13 versions</span>
          <span id="songCount">391 songs</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="songs-section" aria-label="Selected playlist songs">
        <div class="songs-head">
          <div>
            <span class="small-label">Songs</span>
            <strong id="songsTitle">driving v13</strong>
          </div>
          <span id="songsCoverage">62 songs</span>
        </div>
        <div id="songsList" class="songs-list"></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
